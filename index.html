<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}
h1 {
  text-align: center;
  background: #2a72d4;
  color: white;
  padding: 20px;
}
.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}
.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  font-size: 18px;
}
input[type="number"] {
  width: 70px;
  text-align: center;
}
input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  font-size: 16px;
}
label {
  font-weight: bold;
}
#celkem, #pocet {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
  color: #2a72d4;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  font-size: 24px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
button:hover {
  background: #e85a28;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">

  <div id="items"></div>

  <div id="celkem">Celková cena: 0 Kč</div>
  <div id="pocet">Počet kusů: 0</div>

  <!-- ✅ NOVÁ POVINNÁ POLE -->
  <label for="jmeno">VAŠE JMÉNO (Příjmení Jméno):</label>
  <input type="text" id="jmeno" placeholder="Novák Jan" required>

  <label for="telefon">TELEFON:</label>
  <input type="text" id="telefon" placeholder="+420 123 456 789" required>

  <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let items = [];

// ✅ načítání CSV
async function loadCSV() {
  try {
    const response = await fetch("data_bufet.csv?t=" + Date.now());
    if (!response.ok) {
      throw new Error("Soubor nebyl nalezen");
    }
    const text = await response.text();
    parseCSV(text);
    renderItems();
  } catch (err) {
    console.error(err);
    alert("Chyba načítání CSV.");
  }
}

// ✅ parsování CSV
function parseCSV(text) {
  items = [];
  const lines = text.split("\n");

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    const [nazev, cena] = line.split(";");
    if (nazev && cena) {
      items.push({
        nazev: nazev.trim(),
        cena: parseFloat(cena.replace(",", ".")),
        mnozstvi: 0
      });
    }
  }
}

// ✅ vykreslení položek
function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.nazev} (${item.cena} Kč)</span>
      <input type="number" min="0" value="0"
        onchange="updateItem(${index}, this.value)">
    `;

    container.appendChild(div);
  });
}

// ✅ změna množství
function updateItem(index, value) {
  items[index].mnozstvi = parseInt(value) || 0;
  updateSummary();
}

// ✅ výpočet součtu
function updateSummary() {
  let celkem = 0;
  let pocet = 0;

  items.forEach(item => {
    celkem += item.cena * item.mnozstvi;
    pocet += item.mnozstvi;
  });

  document.getElementById("celkem").innerText =
    "Celková cena: " + celkem.toFixed(2) + " Kč";

  document.getElementById("pocet").innerText =
    "Počet kusů: " + pocet;
}

// ✅ MAILTO FUNKCE (HLAVNÍ ČÁST)
function odeslatObjednavku() {

  const jmeno = document.getElementById("jmeno").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // ✅ kontrola povinných polí
  if (!jmeno || !telefon) {
    alert("Vyplň jméno i telefon!");
    return;
  }

  const objednavka = items.filter(item => item.mnozstvi > 0);

  if (objednavka.length === 0) {
    alert("Nevybral jsi žádné položky!");
    return;
  }

  let celkem = 0;
  let pocet = 0;

  let text = "OBJEDNÁVKA BUFET\n\n";
  text += "Jméno: " + jmeno + "\n";
  text += "Telefon: " + telefon + "\n\n";

  text += "Položky:\n";

  objednavka.forEach(item => {
    const cenaCelkem = item.cena * item.mnozstvi;
    celkem += cenaCelkem;
    pocet += item.mnozstvi;

    text += `${item.nazev} - ${item.mnozstvi} ks = ${cenaCelkem.toFixed(2)} Kč\n`;
  });

  text += "\n-------------------\n";
  text += "Počet kusů: " + pocet + "\n";
  text += "Celková cena: " + celkem.toFixed(2) + " Kč\n";

  // ✅ MAILTO – otevře e-mail klienta
  const mailtoLink =
    "mailto:krenek.tomas@kostka-skola.cz" +
    "?subject=" + encodeURIComponent("Objednávka bufet") +
    "&body=" + encodeURIComponent(text);

  window.location.href = mailtoLink;
}

// start
loadCSV();

</script>

</body>
</html>
